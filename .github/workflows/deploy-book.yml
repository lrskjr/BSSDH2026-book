name: Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Jupyter Book
        run: jupyter-book build . --all

      - name: Remove large zip from Pages output
        run: rm -f ./_build/html/_static/files/data/daells-warehouse-categories.zip

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
          publish_branch: gh-pages

      - name: Upload image dataset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: workshop-data
          name: Workshop data — image dataset
          body: Large files for BSSDH2026 workshops (not deployed via GitHub Pages).
          files: _static/files/data/daells-warehouse-categories.zip
          overwrite_files: true
          make_latest: false
