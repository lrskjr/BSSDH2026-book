    <style>
    html, body, table {

    div.normal textarea:invalid {
        display: none;
    }

    div.selected textarea {
        display: block;
    }

        section.section, img {
            page-break-inside: avoid;
        }
    }

    <script>

        sel_el = document.getElementById(id);

            sel_el.className = 'selected';
            return true;
        }
        return false;
    };
